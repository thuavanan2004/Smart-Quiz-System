# =============================================================================
# SMART QUIZ SYSTEM - OBSERVABILITY STACK (OPT-IN)
# =============================================================================
# Prometheus + Grafana + Jaeger + Loki — chỉ bật khi cần test metrics/traces.
#
# Chạy song song với stack dev chính:
#   docker compose -f infra/docker-compose.dev.yml -f infra/docker-compose.obs.yml up -d
#
# Tài nguyên đáng kể (~2GB RAM), nên tắt khi không dùng.
# =============================================================================

name: smartquiz-obs

services:

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sq_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    ports: ["9090:9090"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus

  grafana:
    image: grafana/grafana:10.4.2
    container_name: sq_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    # Host 3001 đã dùng bởi Auth Service → Grafana map sang 3030.
    ports: ["3030:3000"]
    volumes:
      - grafanadata:/var/lib/grafana
      - ./observability/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on: [prometheus, loki, jaeger]

  loki:
    image: grafana/loki:2.9.6
    container_name: sq_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports: ["3100:3100"]
    volumes: [lokidata:/loki]

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: sq_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"    # UI
      - "4317:4317"      # OTLP gRPC
      - "4318:4318"      # OTLP HTTP

volumes:
  promdata:
  grafanadata:
  lokidata:
