global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # Services Java (Spring Boot Actuator /actuator/prometheus)
  # Port actuator khớp `management.server.port` trong application.yml của mỗi service.
  - job_name: sq-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:9001   # auth
          - host.docker.internal:9002   # exam
          - host.docker.internal:9003   # question
          - host.docker.internal:9005   # cheat-detection
          - host.docker.internal:9006   # analytics
        labels:
          env: local

  # AI service Python (FastAPI + prometheus-fastapi-instrumentator)
  - job_name: sq-ai
    metrics_path: /metrics
    static_configs:
      - targets: [host.docker.internal:8201]
        labels:
          env: local
