spring:
  application:
    name: cheat-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/smartquiz_cheat}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        compression.type: lz4
    consumer:
      group-id: cheat-service
      enable-auto-commit: false
      auto-offset-reset: earliest
      max-poll-records: 500
      properties:
        isolation.level: read_committed
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:3001/.well-known/jwks.json}

server:
  port: 3005
  forward-headers-strategy: framework

management:
  server:
    port: 9005
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true

cheat:
  grpc:
    port: 4005
  clickhouse:
    url: ${CLICKHOUSE_URL:jdbc:ch://localhost:8123/smartquiz_cheat}
    username: ${CLICKHOUSE_USER:default}
    password: ${CLICKHOUSE_PASSWORD:}
  risk:
    # Threshold từ design doc §4 — calibrate lại sau khi có dữ liệu thật
    alert-score: 70
    suspend-score: 90
  topics:
    proctor-signal: proctor.signal.v1
    cheat-alert: cheat.alert.v1

logging:
  level:
    root: INFO
    vn.smartquiz: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
