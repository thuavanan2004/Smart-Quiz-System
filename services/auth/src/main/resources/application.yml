spring:
  application:
    name: auth-service
  # Graceful shutdown — Tomcat từ chối request mới, hoàn thành in-flight tối đa 30s rồi exit.
  # K8s SIGTERM → terminationGracePeriodSeconds ≥ 35s để cover.
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartquiz}
    username: ${DB_USER:smartquiz}
    password: ${DB_PASSWORD:smartquiz}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      # Schema quản lý bởi Flyway — Hibernate không suy diễn/validate để tránh sai khớp
      # type mapping (CITEXT, INET) giữa Postgres và Hibernate defaults.
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: "filesystem:../../database/postgresql/migrations"
    schemas: public
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

server:
  port: 3001
  shutdown: graceful
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

management:
  server:
    port: 9001
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true

auth:
  jwt:
    # Dev: đọc PEM local. Prod: override bằng Vault Transit (xem ADR-001).
    private-key-path: ${JWT_PRIVATE_KEY_PATH:../../ops/keys/jwt.private.pem}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:../../ops/keys/jwt.public.pem}
    key-id: ${JWT_KEY_ID:2026-04-key1}
    issuer: ${JWT_ISSUER:https://auth.smartquiz.vn}
    audience: ${JWT_AUDIENCE:smartquiz-api}
    access-ttl-seconds: 900
    refresh-ttl-days: 7
  # Dev-only: trả token verify_email + reset_password trong response (/auth/register,
  # /auth/password/forgot) để test không cần SMTP. KHÔNG bật ở prod — rò rỉ token.
  dev:
    expose-verification-token: ${AUTH_DEV_EXPOSE_VERIFY_TOKEN:false}
    expose-reset-token: ${AUTH_DEV_EXPOSE_RESET_TOKEN:false}
  rate-limit:
    # Tắt chỉ khi test hoặc dev cần spam endpoint. Prod LUÔN bật.
    enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
  cors:
    # CSV các origin cho phép. KHÔNG để "*" ở prod (Iron Rule #6 + design §13.2).
    # Dev mặc định cho Next.js local.
    allowed-origins: ${AUTH_CORS_ORIGINS:http://localhost:3000,http://localhost:3333}

logging:
  level:
    root: INFO
    vn.smartquiz: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
