spring:
  application:
    name: question-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartquiz}
    username: ${DB_USER:smartquiz}
    password: ${DB_PASSWORD:smartquiz}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: "filesystem:../../database/postgresql/migrations"
    schemas: public
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/smartquiz}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
    elasticsearch:
      repositories:
        enabled: true
  elasticsearch:
    uris: ${ES_URIS:http://localhost:9200}
    connection-timeout: 2s
    socket-timeout: 10s
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        compression.type: lz4
    consumer:
      group-id: question-service
      enable-auto-commit: false
      auto-offset-reset: earliest
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:3001/.well-known/jwks.json}

server:
  port: 3003
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

management:
  server:
    port: 9003
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true

question:
  search:
    # KNN vector similarity threshold cho duplicate detection
    duplicate-threshold: 0.85
  embedding:
    # Topic tiêu thụ từ AI Service khi embedding được sinh xong
    topic: ai.question_embedding_generated.v1

logging:
  level:
    root: INFO
    vn.smartquiz: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
